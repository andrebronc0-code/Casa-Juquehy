<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Casa à venda em Juquehy</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<section class="hero">

<img src="imagens/fotofachada.jpg" class="hero-img">

<div class="hero-text">
<h1>Casa à venda em Juquehy</h1>
<p>Casa de condomínio no litoral</p>
</div>

</section>


<div class="container">

<div class="slider">

<img class="slide" src="imagens/fotofachada.jpg">

<button class="prev" onclick="mudarSlide(-1)">❮</button>
<button class="next" onclick="mudarSlide(1)">❯</button>

</div>

</div>


<script>

let slideIndex = 1;
mostrarSlide(slideIndex);

function mudarSlide(n){
mostrarSlide(slideIndex += n);
}

function mostrarSlide(n){

let slides = document.getElementsByClassName("slide");

if(n > slides.length){
slideIndex = 1;
}

if(n < 1){
slideIndex = slides.length;
}

for(let i = 0; i < slides.length; i++){
slides[i].style.display = "none";
}

slides[slideIndex-1].style.display = "block";

}

</script>

</body>
</html>
